services:
  - type: web
    name: vitalyn-api
    runtime: docker
    plan: starter
    rootDir: backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: vitalyn-api
      - key: CORS_ORIGINS
        value: https://krishnamakodiya.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: vitalyn-db
          property: connectionString

databases:
  - name: vitalyn-db
    plan: starter
